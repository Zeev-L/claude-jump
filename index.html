<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Opening Claude…</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
       background:#f4f5f7;color:#1f2329;display:flex;align-items:center;justify-content:center;
       height:100vh;margin:0;text-align:center}
  .c{max-width:380px;padding:22px}
  .b{display:inline-block;background:#4f46e5;color:#fff;text-decoration:none;font-size:17px;
     font-weight:700;padding:14px 26px;border-radius:12px;margin-top:8px}
  .s{color:#6b7280;font-size:13px;margin-top:16px;line-height:1.55}
  b{color:#1f2329}
</style>
</head>
<body>
  <div class="c">
    <a class="b" id="go" href="#" autofocus>↗ Open session</a>
    <div class="s">
      First time only: when your browser asks <b>“Open ClaudeJump?”</b>,
      tick <b>“Always allow…”</b> — after that this opens <b>instantly</b>, no click.
    </div>
  </div>
  <script>
    var t = new URLSearchParams(location.search).get('t') || '';
    var url = 'claudejump://open?title=' + encodeURIComponent(t);
    var go = document.getElementById('go');
    go.href = url;
    go.focus();
    // auto-attempt: once the user has ticked "Always allow", this fires instantly
    // with no dialog and no click. Before that, browsers block it → use the button.
    if (t) { try { location.replace(url); } catch (e) { location.href = url; } }
  </script>
</body>
</html>
